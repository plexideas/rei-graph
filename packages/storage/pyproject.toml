[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rei-storage"
version = "0.1.0"
description = "Storage layer for rei-graph"
requires-python = ">=3.11"
dependencies = ["neo4j>=5.0", "rei-core"]

[tool.hatch.build.targets.wheel]
packages = ["src/rei_storage"]

[tool.uv.sources]
rei-core = { workspace = true }
