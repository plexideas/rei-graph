[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dgk-storage"
version = "0.1.0"
description = "Storage layer for dev-graph-kit"
requires-python = ">=3.11"
dependencies = ["neo4j>=5.0", "dgk-core"]

[tool.hatch.build.targets.wheel]
packages = ["src/dgk_storage"]

[tool.uv.sources]
dgk-core = { workspace = true }
