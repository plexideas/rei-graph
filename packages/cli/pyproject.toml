[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rei-cli"
version = "0.2.5"
description = "CLI for rei-graph"
requires-python = ">=3.11"
dependencies = ["click>=8.0", "rich>=13.0", "rei-core", "rei-storage", "rei-mcp"]

[project.scripts]
rei = "rei_cli.main:cli"

[tool.hatch.build.targets.wheel]
# At release time the CI patches this file and copies workspace package
# sources in before running uv build (see .github/workflows/release.yml)
packages = ["src/rei_cli"]

[tool.uv.sources]
rei-core = { workspace = true }
rei-storage = { workspace = true }
rei-mcp = { workspace = true }
