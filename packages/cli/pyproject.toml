[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dgk-cli"
version = "0.1.0"
description = "CLI for dev-graph-kit"
requires-python = ">=3.11"
dependencies = ["click>=8.0", "dgk-core", "dgk-storage"]

[project.scripts]
dgk = "dgk_cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/dgk_cli"]

[tool.uv.sources]
dgk-core = { workspace = true }
dgk-storage = { workspace = true }
