[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dgk-mcp"
version = "0.1.0"
description = "MCP server for dev-graph-kit"
requires-python = ">=3.11"
dependencies = ["mcp>=1.0", "dgk-core", "dgk-storage"]

[tool.hatch.build.targets.wheel]
packages = ["src/dgk_mcp"]

[tool.uv.sources]
dgk-core = { workspace = true }
dgk-storage = { workspace = true }
