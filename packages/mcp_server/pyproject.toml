[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rei-mcp"
version = "0.1.0"
description = "MCP server for rei-graph"
requires-python = ">=3.11"
dependencies = ["mcp>=1.0", "rei-core", "rei-storage"]

[tool.hatch.build.targets.wheel]
packages = ["src/rei_mcp"]

[tool.uv.sources]
rei-core = { workspace = true }
rei-storage = { workspace = true }
