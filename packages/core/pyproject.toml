[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rei-core"
version = "0.1.0"
description = "Core library for rei-graph"
requires-python = ">=3.11"
dependencies = ["tomli-w>=1.0", "pydantic>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/rei_core"]
