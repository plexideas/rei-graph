name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node.js (TS ingester build) ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/ingester_ts/package-lock.json

      # ── Python / uv ──────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Bundle TS ingester and workspace packages into CLI
        run: |
          ./scripts/bundle_ingester.sh
          # Copy workspace package sources into the CLI src so hatch can
          # bundle them into a single self-contained wheel.
          cp -r packages/core/src/rei_core       packages/cli/src/
          cp -r packages/storage/src/rei_storage packages/cli/src/
          cp -r packages/mcp_server/src/rei_mcp  packages/cli/src/
          # Patch pyproject.toml: replace workspace deps with PyPI equivalents
          # and add the bundled packages to the hatch wheel target.
          python3 - <<'EOF'
import re, pathlib
p = pathlib.Path("packages/cli/pyproject.toml")
txt = p.read_text()
# Replace dependencies list
txt = re.sub(
    r'dependencies = \[.*?\]',
    'dependencies = ["click>=8.0", "rich>=13.0", "tomli-w>=1.0", "pydantic>=2.0", "neo4j>=5.0", "mcp>=1.0"]',
    txt, flags=re.DOTALL
)
# Replace hatch wheel packages list
txt = re.sub(
    r'packages = \["src/rei_cli"\]',
    'packages = ["src/rei_cli", "src/rei_core", "src/rei_storage", "src/rei_mcp"]',
    txt
)
# Remove [tool.uv.sources] block (not needed for the standalone build)
txt = re.sub(r'\[tool\.uv\.sources\][\s\S]*', '', txt).rstrip() + '\n'
p.write_text(txt)
print(p.read_text())
EOF

      - name: Build Python wheel and sdist
        run: uv build --package rei-cli --out-dir dist/

      # ── Extract version from tag (strips leading "v") ─────────────────────
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release if it doesn't exist yet; ignore error if it does
          gh release create "$GITHUB_REF_NAME" \
            --title "rei-graph ${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz 2>/dev/null \
          || gh release upload "$GITHUB_REF_NAME" \
            --clobber \
            dist/*.whl dist/*.tar.gz

      # ── Homebrew tap update ───────────────────────────────────────────────
      - name: Compute wheel SHA256
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WHEEL_FILE=$(ls dist/rei_cli-${VERSION}-*.whl | head -1)
          WHEEL_NAME=$(basename "${WHEEL_FILE}")
          echo "sha256=$(sha256sum ${WHEEL_FILE} | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${WHEEL_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.tarball.outputs.sha256 }}"
          URL="${{ steps.tarball.outputs.url }}"

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/plexideas/homebrew-tap.git" \
            tap-repo
          cd tap-repo

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/rei-graph.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/rei-graph.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/rei-graph.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rei-graph.rb
          git diff --staged --quiet || git commit -m "Update rei-graph to ${VERSION}"
          git push
